<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 2026 香港研討會手帳</title>
    
    <!-- 載入 Tailwind CSS & React 核心 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --diary-bg: #F9F7F2;
            --diary-pink: #FFB7C5;
            --diary-blue: #AEC6CF;
            --diary-navy: #3D405B;
            --diary-yellow: #F4F1DE;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: var(--diary-bg);
            color: var(--diary-navy);
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* 手帳感卡片 */
        .diary-card {
            background: white;
            border: 2px solid var(--diary-navy);
            border-radius: 2rem;
            box-shadow: 4px 4px 0px var(--diary-navy);
            transition: all 0.2s ease;
        }

        .diary-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--diary-navy);
        }

        /* 標籤設計 */
        .day-tag {
            background: #E07A5F;
            color: white;
            padding: 4px 16px;
            border-radius: 999px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            border: 2px solid var(--diary-navy);
        }

        /* 動畫 */
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .diamond-bullet::before {
            content: "✧";
            color: var(--diary-pink);
            font-weight: 900;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SafeIcon = ({ name, size = 20, className = "", strokeWidth = 2.5 }) => {
            const LucideLib = window.lucideReact || window.Lucide || {};
            const IconComponent = LucideLib[name] || LucideLib[name.charAt(0).toUpperCase() + name.slice(1)];
            if (!IconComponent) return null;
            return <IconComponent size={size} className={className} strokeWidth={strokeWidth} />;
        };

        const apiKey = ""; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        const callGemini = async (prompt) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "你是一位超可愛的旅遊手帳小管家，說話親切並會提供香港旅遊建議。" }] }
            };
            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return "哎呀，連線失敗了！請再試一次。"; }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(0);
            const [role, setRole] = useState('student');
            const [hkd, setHkd] = useState('');
            const [twd, setTwd] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const [aiResponse, setAiResponse] = useState("");

            const itinerary = [
                {
                    date: "04/20", dayText: "DAY 1", title: "冒險開始囉！", 
                    events: [
                        { time: "10:15", title: "長榮 BR867 啟程", desc: "提前抵達櫃檯取名牌", trans: "建議 08:15 集合" },
                        { time: "12:05", title: "降落香港機場", desc: "搭 A41 機場巴士直達沙田", trans: "車資 HK$23.4" },
                        { time: "17:30", title: "晚餐：二鍋頭火鍋", desc: "全體師生慶功晚宴", trans: "步行約 11 分鐘" }
                    ]
                },
                {
                    date: "04/21", dayText: "DAY 2", title: "學術與自由行", 
                    events: [
                        { time: "07:15", title: "早餐：紅茶冰室", desc: "大廳 07:00 集合同行", trans: "必吃：奶茶、炒蛋" },
                        { time: "10:00", title: "研討會報告 (碩二)", desc: "請穿正式服裝報告", trans: "東鐵綫轉 74K 巴士" },
                        { time: "13:30", title: "自由行時間", desc: "可選 A/B/C 三條推薦路線", trans: "東鐵綫直達尖東" }
                    ]
                },
                {
                    date: "04/22", dayText: "DAY 3", title: "碩一報告日", 
                    events: [
                        { time: "09:30", title: "早餐：牛奶冰室", desc: "輕鬆用餐迎接發表", trans: "步行 3 分鐘" },
                        { time: "12:00", title: "研討會報告 (碩一)", desc: "碩一發表時段，加油！", trans: "交通同前日" },
                        { time: "18:30", title: "官方晚宴：八方棧", desc: "記得帶胸牌！搭接駁車", trans: "憑胸牌搭乘" }
                    ]
                },
                {
                    date: "04/23", dayText: "DAY 4", title: "收穫滿滿回台灣", 
                    events: [
                        { time: "10:00", title: "蛋塔採購：Bakehouse", desc: "沙田店就在飯店樓下", trans: "回台當天買最鮮" },
                        { time: "15:45", title: "前往機場 (最晚 16:00)", desc: "別錯過 A41 巴士喔！", trans: "Citybus A41" },
                        { time: "19:40", title: "搭機回台 (BR872)", desc: "明年再見，HK！", trans: "17:30 前完成安檢" }
                    ]
                }
            ];

            const askAI = async (type) => {
                setAiLoading(true);
                const prompt = type === 'cantonese' ? "教我3個在香港點餐最有用的粵語句子" : "推薦沙田或尖沙咀的隱藏版美食";
                const res = await callGemini(prompt);
                setAiResponse(res);
                setAiLoading(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32 overflow-hidden relative">
                    {/* Header */}
                    <div className="px-6 pt-10 pb-6 flex justify-between items-end">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <SafeIcon name="Anchor" className="text-blue-400" />
                                <h1 className="text-2xl font-black tracking-tight" style={{color: 'var(--diary-navy)'}}>香港 · 行</h1>
                            </div>
                            <p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Hong Kong Diary 2026</p>
                        </div>
                        <div className="day-tag">{itinerary[activeDay].dayText}</div>
                    </div>

                    {/* Role Selector */}
                    <div className="px-6 mb-6">
                        <div className="flex bg-white border-2 border-[var(--diary-navy)] rounded-2xl p-1 shadow-[2px_2px_0px_var(--diary-navy)]">
                            <button onClick={()=>setRole('student')} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${role==='student'?'bg-[var(--diary-blue)] text-white':'text-slate-400'}`}>同學版</button>
                            <button onClick={()=>setRole('teacher')} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${role==='teacher'?'bg-[var(--diary-pink)] text-white':'text-slate-400'}`}>老師版</button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="px-6 space-y-6">
                        {activeTab === 'itinerary' && (
                            <div className="animate-pop space-y-6">
                                {/* Hero Card */}
                                <div className="diary-card p-6 relative overflow-hidden">
                                    <div className="absolute top-4 right-4 opacity-10 rotate-12">
                                        <SafeIcon name="Plane" size={60} />
                                    </div>
                                    <p className="text-[12px] font-bold text-pink-400 mb-2">Today · {itinerary[activeDay].date}</p>
                                    <h2 className="text-3xl font-black mb-6">{itinerary[activeDay].title}</h2>
                                    <ul className="space-y-4">
                                        {itinerary[activeDay].events.map((e, i) => (
                                            <li key={i} className="flex gap-3">
                                                <span className="text-[10px] font-black bg-slate-100 px-2 py-1 rounded h-fit mt-1">{e.time}</span>
                                                <div>
                                                    <p className="font-bold text-md diamond-bullet">{e.title}</p>
                                                    <p className="text-xs text-slate-500 font-medium">{role === 'teacher' ? '老師專屬提醒已準備' : e.desc}</p>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                    <button className="w-full mt-8 py-3 bg-[var(--diary-blue)] text-white font-black rounded-2xl border-2 border-[var(--diary-navy)] shadow-[4px_4px_0px_var(--diary-navy)]">
                                        行程全覽
                                    </button>
                                </div>
                                
                                {/* Date Navigation Circles */}
                                <div className="flex justify-between gap-2 overflow-x-auto pb-4 scrollbar-hide">
                                    {itinerary.map((d, i) => (
                                        <button key={i} onClick={() => setActiveDay(i)} className={`flex-shrink-0 w-16 h-16 rounded-full border-2 border-[var(--diary-navy)] flex flex-col items-center justify-center transition-all ${activeDay===i?'bg-yellow-200 scale-110 shadow-lg': 'bg-white'}`}>
                                            <span className="text-[9px] font-black">{d.dayText}</span>
                                            <span className="text-[11px] font-bold">{d.date.split('/')[1]}日</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'tools' && (
                            <div className="animate-pop space-y-6">
                                <div className="diary-card p-6 bg-yellow-50">
                                    <h3 className="font-black text-lg mb-4 flex items-center gap-2">
                                        <SafeIcon name="RefreshCw" /> 算帳小幫手
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="relative">
                                            <input type="number" value={hkd} onChange={(e)=>{setHkd(e.target.value); setTwd(e.target.value? (e.target.value*4.15).toFixed(0) : '')}} placeholder="輸入港幣 HKD" className="w-full p-4 rounded-2xl border-2 border-[var(--diary-navy)] font-bold outline-none" />
                                            <span className="absolute right-4 top-4 font-black opacity-30">HKD</span>
                                        </div>
                                        <div className="flex justify-center"><SafeIcon name="ChevronDown" className="text-yellow-500 animate-bounce" /></div>
                                        <div className="p-4 bg-white rounded-2xl border-2 border-[var(--diary-navy)] text-center">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase">換算台幣約</p>
                                            <p className="text-3xl font-black text-orange-500">NT$ {twd || 0}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'explore' && (
                            <div className="animate-pop space-y-4">
                                <div className="diary-card p-6 bg-blue-50 border-dashed">
                                    <h3 className="font-black text-lg mb-3">路線 A：尖沙咀散步</h3>
                                    <p className="text-sm font-medium leading-relaxed">星光大道拍照 → 歷史博物館 → 維港夜景（20:00 幻彩詠香江）</p>
                                </div>
                                <div className="diary-card p-6 bg-rose-50 border-dashed">
                                    <h3 className="font-black text-lg mb-3">蛋塔戰利品推薦</h3>
                                    <p className="text-sm font-medium leading-relaxed">🥐 Bakehouse (沙田店): 就在飯店隔壁，回台當天買最鮮。</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ai' && (
                            <div className="animate-pop space-y-6">
                                <div className="diary-card p-8 bg-indigo-50 border-4 relative overflow-hidden">
                                    <div className="absolute -right-4 -bottom-4 opacity-5 rotate-12"><SafeIcon name="Sparkles" size={100} /></div>
                                    <div className="grid grid-cols-2 gap-4 mb-6 relative z-10">
                                        <button onClick={() => askAI('cantonese')} disabled={aiLoading} className="bg-white p-4 rounded-2xl text-xs font-black border-2 border-[var(--diary-navy)] shadow-[2px_2px_0px_var(--diary-navy)] text-indigo-500 active:translate-y-0.5">學學粵語</button>
                                        <button onClick={() => askAI('tips')} disabled={aiLoading} className="bg-white p-4 rounded-2xl text-xs font-black border-2 border-[var(--diary-navy)] shadow-[2px_2px_0px_var(--diary-navy)] text-indigo-500 active:translate-y-0.5">拿拿撇步</button>
                                    </div>
                                    {aiLoading ? (
                                        <div className="flex flex-col items-center py-8">
                                            <SafeIcon name="Loader2" className="animate-spin text-indigo-400 mb-2" />
                                            <span className="text-[10px] font-black tracking-widest text-indigo-300">規劃中...</span>
                                        </div>
                                    ) : aiResponse && (
                                        <div className="bg-white/80 p-6 rounded-3xl text-sm font-bold leading-relaxed border-2 border-indigo-200 animate-pop shadow-inner">
                                            {aiResponse}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Bottom Nav - 模擬截圖風格 */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50 px-4 pb-6">
                        <div className="bg-white border-[3px] border-[var(--diary-navy)] p-2 flex justify-between items-center rounded-[3rem] shadow-[0_10px_25px_rgba(0,0,0,0.1)]">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'itinerary' ? 'bg-rose-100 scale-105' : ''}`}>
                                <SafeIcon name="Home" className={activeTab === 'itinerary' ? 'text-rose-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">行程</span>
                            </button>
                            <button onClick={() => setActiveTab('tools')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'tools' ? 'bg-yellow-100 scale-105' : ''}`}>
                                <SafeIcon name="RefreshCw" className={activeTab === 'tools' ? 'text-amber-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">工具</span>
                            </button>
                            <button onClick={() => setActiveTab('explore')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'explore' ? 'bg-blue-100 scale-105' : ''}`}>
                                <SafeIcon name="Map" className={activeTab === 'explore' ? 'text-blue-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">景點</span>
                            </button>
                            <button onClick={() => setActiveTab('ai')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'ai' ? 'bg-indigo-100 scale-105' : ''}`}>
                                <SafeIcon name="Sparkles" className={activeTab === 'ai' ? 'text-indigo-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black uppercase">助手</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
