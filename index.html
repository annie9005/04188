<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 2026 香港研討會之旅</title>
    
    <!-- 載入 Tailwind CSS & React 核心 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Quicksand:wght@500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --diary-bg: #F9F7F2;
            --diary-pink: #FFB7C5;
            --diary-blue: #AEC6CF;
            --diary-navy: #3D405B;
            --diary-yellow: #F4F1DE;
            --diary-orange: #E07A5F;
            --diary-jade: #1D7A5F;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: var(--diary-bg);
            color: var(--diary-navy);
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .diary-card {
            background: white;
            border: 2.5px solid var(--diary-navy);
            border-radius: 1.5rem;
            box-shadow: 4px 4px 0px var(--diary-navy);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .diary-card-active {
            background-color: #FFFDF0;
            border-color: var(--diary-orange);
            box-shadow: 2px 2px 0px var(--diary-navy);
        }

        .detail-btn {
            background: white;
            border: 2px dashed var(--diary-blue);
            color: var(--diary-navy);
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .diamond-bullet::before {
            content: "✧";
            color: var(--diary-pink);
            font-weight: 900;
            margin-right: 8px;
        }

        .time-line-connector {
            width: 3px;
            height: 15px;
            background: var(--diary-navy);
            margin-left: 2.5rem;
            opacity: 0.2;
        }

        .teacher-must-tag {
            background: #E8294A;
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 5px;
        }
        
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const SafeIcon = ({ name, size = 20, className = "", strokeWidth = 2.5 }) => {
            const LucideLib = window.lucideReact || window.Lucide || {};
            const IconComponent = LucideLib[name] || LucideLib[name.charAt(0).toUpperCase() + name.slice(1)];
            if (!IconComponent) return null;
            return <IconComponent size={size} className={className} strokeWidth={strokeWidth} />;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(0);
            const [role, setRole] = useState('student');
            const [expandedEvent, setExpandedEvent] = useState(null);
            const [hkd, setHkd] = useState('');
            const [twd, setTwd] = useState('');

            const itinerary = [
                {
                    date: "4/20", dayText: "DAY 1", 
                    headerTitle: "抵達香港🇭🇰 安頓行李～輕鬆行程為明天做準備",
                    summary: "12:05 抵達 · 寄放行李 · Snoopy's World · 晚餐二鍋頭",
                    infoBox: "從香港機場搭乘 A41 機場大巴 (約 54 分鐘) 直達沙田市中心總站，下車後步行 5 分鐘即達飯店車資約 HK$23.4",
                    events: [
                        { id: "1-1", time: "12:05", title: "抵達香港國際機場", desc: "通關、取行李，準備出發前往搭乘大巴", tip: "📋 下機後檢查所需證件與八達通卡", map: "香港國際機場" },
                        { id: "1-2", time: "12:30", title: "搭乘 A41 機場大巴", desc: "機場站 ➡️ A41 (預計 54 分鐘) ➡️ 沙田市中心總站", trans: "車資 HK$23.4", map: "沙田市中心巴士總站" },
                        { id: "1-3", time: "13:30", title: "帝都酒店 (Royal Park Hotel) — 寄放行李", desc: "先將行李寄放在飯店櫃台，輕裝出發去逛逛", map: "沙田帝都酒店" },
                        { id: "1-4", time: "14:00", title: "史努比開心世界 (Snoopy's World)", desc: "新城市廣場 3 樓平台。獨木舟探趣：12:00-18:00，建議體驗！", tip: "📍 飯店隔壁，步行 3 分鐘即達。園區免費。", map: "史努比開心世界" },
                        { id: "1-5", time: "15:30", title: "返回酒店辦理 Check-in", desc: "正式入住、稍微休息並確認明日報告資料", tip: "🥐 午茶首選：旁邊 3 期的 Bakehouse 買蛋塔", map: "沙田帝都酒店" },
                        { id: "1-6", time: "17:30", title: "晚餐：二鍋頭 (Er Guo Tou)", desc: "沙田分店聚餐，火鍋吃到飽，大口吃肉補充體力！", tip: "⏰ 限時 120 分鐘吃到飽", map: "沙田二鍋頭" },
                        { id: "1-7", time: "20:00", title: "回房準備與休息", desc: "明天 08:00 集合早餐，保持最佳狀態", map: "沙田帝都酒店" }
                    ]
                },
                {
                    date: "4/21", dayText: "DAY 2", 
                    headerTitle: "碩二生上場！下午解鎖自由模式 🔓",
                    summary: "10:00–12:30 研討會報告 · 下午老師個人行程 · 學生自由行",
                    warnBox: "👨‍🏫 老師會一起用早餐，請全體 07:00 在大廳集合，準時前往「紅茶冰室」",
                    events: [
                        { id: "2-1", time: "07:00", title: "🏨 大廳集合", desc: "全體在大廳集合，確認人員到齊後準時出發", map: "沙田帝都酒店" },
                        { id: "2-2", time: "07:15", title: "早餐 — 紅茶冰室（沙田）", desc: "必點：🧋 港式奶茶、🍞 菠蘿油、🥚 炒蛋多士", trans: "地道港式冰室體驗", map: "紅茶冰室 沙田" },
                        { id: "2-3", time: "08:30", title: "前往 EdUHK 研討會", desc: "沙田站 ➡️ 東鐵綫 ➡️ 大埔墟站 ➡️ 74K 巴士 ➡️ 校園", map: "香港教育大學" },
                        { id: "2-4", time: "10:00", title: "🎤 研討會報告 — 碩二同學發表", desc: "📌 正式報告時段，碩二全體發表。鎖定時段，不安排衝突行程。", tip: "⚠️ 注意：備份 USB、確認 PPT 字體", map: "香港教育大學" },
                        { id: "2-5", time: "12:30", title: "慶功午餐", desc: "老師開始個人行程，可先一起午餐再分別行動。推薦沙田大圍一帶。", map: "新城市廣場" },
                        { id: "2-6", time: "13:30", title: "🔓 學生自由行", desc: "進入自由行模式！推薦：A. 尖沙咀散步 / B. 深水埗美食 / C. 旺角掃街", map: "尖沙咀星光大道" }
                    ]
                },
                {
                    date: "4/22", dayText: "DAY 3", 
                    headerTitle: "碩一生出擊！下午放鬆 + 研討會晚宴 🥂",
                    summary: "前往 EdUHK · 12:00–13:00 碩一報告 · 晚宴 Bafang Zhan",
                    warnBox: "🎫 出門前確認帶好研討會胸牌！晚宴接駁車需出示胸牌。",
                    events: [
                        { id: "3-1", time: "09:30", title: "早餐 — 牛奶冰室（沙田）", desc: "就在沙田站附近，享用完後直接搭地鐵前往 EdUHK", map: "牛奶冰室 沙田" },
                        { id: "3-2", time: "12:00", title: "研討會發表 — 碩一同學上台", desc: "碩一正式發表時段。加油加油！💪", map: "香港教育大學" },
                        { id: "3-3", time: "14:00", title: "下午放鬆行程", desc: "選 1: 校園散步 / 選 2: 大埔墟老街 / 選 3: 返回沙田補貨", map: "新城市廣場" },
                        { id: "3-4", time: "18:30", title: "🚌 接駁巴士前往晚宴", desc: "📍 Bafang Zhan（八方棧）。上車前需出示胸牌。", tip: "⚠️ 沒帶胸牌可能無法進入晚宴", map: "八方棧" }
                    ]
                },
                {
                    date: "4/23", dayText: "DAY 4", 
                    headerTitle: "最後一天！輕鬆逛，準時回家 🏠",
                    summary: "19:40 班機 · A41 安全搭車時間回推 · 輕鬆伴手禮行程",
                    infoBox: "⏰ A41 建議 16:00 前上車！15:45 就到巴士站候車，15:30 從飯店出發。",
                    events: [
                        { id: "4-1", time: "08:00", title: "最後一頓早餐", desc: "新城市廣場附近茶餐廳，回顧這幾天回憶", map: "新城市廣場" },
                        { id: "4-2", time: "10:00", title: "蛋塔最後採買環節", desc: "🛒 Bakehouse (沙田店)：就在新城市廣場下樓即達", map: "Bakehouse 沙田" },
                        { id: "4-3", time: "12:30", title: "🍱 師生最後午餐", desc: "這次旅程的最後一頓正式午餐，好好珍惜！", map: "新城市廣場" },
                        { id: "4-4", time: "16:00", title: "🚌 最晚搭 A41 出發機場", desc: "超過 16:00 搭車有趕不上班機風險！", tip: "目的地：香港國際機場 T1", map: "香港國際機場" },
                        { id: "4-5", time: "19:40", title: "✈️ 起飛回台", desc: "結束香港之旅，期待明年見！", map: "香港國際機場" }
                    ]
                }
            ];

            const teacherGuide = [
                { day: "DAY 1 · 4/20", title: "✈️ 抵達日", items: [
                    { time: "12:05", label: "抵達香港", must: true },
                    { time: "13:30", label: "飯店行李寄放 (Royal Park)", must: true },
                    { time: "14:00", label: "史努比開心世界", must: true },
                    { time: "15:30", label: "正式入住 Check-in", must: true },
                    { time: "17:30", label: "師生晚餐：二鍋頭", must: true }
                ]},
                { day: "DAY 2 · 4/21", title: "🎤 碩二報告日", items: [
                    { time: "07:00", label: "大廳集合", must: true },
                    { time: "07:15", label: "早餐同行 (紅茶冰室)", must: true },
                    { time: "08:30", label: "搭地鐵前往 EdUHK", must: true },
                    { time: "10:00", label: "研討會發表 (碩二報告)", must: true },
                    { time: "12:10", label: "老師開始個人行程", must: false }
                ]},
                { day: "DAY 3 · 4/22", title: "🏫 碩一報告日", items: [
                    { time: "09:15", label: "大廳集合", must: true },
                    { time: "09:30", label: "早餐同行 (牛奶冰室)", must: true },
                    { time: "10:30", label: "前往 EdUHK 同行", must: true },
                    { time: "12:00", label: "碩一報告發表", must: true },
                    { time: "12:45", label: "午餐同行", must: true }
                ]},
                { day: "DAY 4 · 4/23", title: "✈️ 回程日", items: [
                    { time: "08:00", label: "早餐同行 (師母同行)", must: true },
                    { time: "12:30", label: "師生最後午餐", must: true },
                    { time: "15:45", label: "搭 A41 返機場", must: true },
                    { time: "19:40", label: "班機起飛", must: true }
                ]}
            ];

            const toggleEvent = (id) => setExpandedEvent(expandedEvent === id ? null : id);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32 overflow-x-hidden relative">
                    {/* Header */}
                    <div className="px-6 pt-10 pb-6 flex justify-between items-end border-b-2 border-dashed border-slate-200">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <SafeIcon name="Anchor" className="text-blue-400" />
                                <h1 className="text-2xl font-black" style={{color: 'var(--diary-navy)'}}>香港 · 行</h1>
                            </div>
                            <p className="text-[10px] font-bold opacity-40 uppercase tracking-widest">Research Trip 2026</p>
                        </div>
                        {activeTab === 'itinerary' && <div className="bg-[#E07A5F] text-white px-4 py-1 rounded-full border-2 border-slate-800 text-xs font-bold shadow-[2px_2px_0px_rgba(0,0,0,0.8)]">{itinerary[activeDay].dayText}</div>}
                    </div>

                    {/* Role & Day Selectors */}
                    <div className="px-6 mt-6 space-y-4">
                        <div className="flex bg-white border-2 border-[var(--diary-navy)] rounded-2xl p-1 shadow-[2px_2px_0px_var(--diary-navy)]">
                            <button onClick={()=>setRole('student')} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${role==='student'?'bg-[var(--diary-blue)] text-white':'text-slate-400'}`}>同學版</button>
                            <button onClick={()=>setRole('teacher')} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${role==='teacher'?'bg-[var(--diary-pink)] text-white':'text-slate-400'}`}>老師版</button>
                        </div>

                        {activeTab === 'itinerary' && (
                            <div className="flex justify-between gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                {itinerary.map((d, i) => (
                                    <button key={i} onClick={() => { setActiveDay(i); setExpandedEvent(null); }} className={`flex-shrink-0 w-16 h-16 rounded-full border-2 border-[var(--diary-navy)] flex flex-col items-center justify-center transition-all ${activeDay===i?'bg-yellow-200 scale-105 shadow-[3px_3px_0px_var(--diary-navy)]': 'bg-white shadow-[2px_2px_0px_var(--diary-navy)]'}`}>
                                        <span className="text-[9px] font-black">{d.dayText}</span>
                                        <span className="text-[11px] font-bold">{d.date.split('/')[1]}日</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Content Section */}
                    <div className="px-6 mt-6 space-y-4">
                        {activeTab === 'itinerary' && (
                            <div className="animate-pop space-y-4">
                                {/* Day Summary Card */}
                                <div className="diary-card p-5 bg-[#FFFDF0] border-dashed">
                                    <h3 className="font-black text-lg mb-2 text-[#E07A5F]">{itinerary[activeDay].headerTitle}</h3>
                                    <p className="text-xs font-bold text-slate-500 mb-3">{itinerary[activeDay].summary}</p>
                                    {itinerary[activeDay].infoBox && <div className="bg-sky-50 p-3 rounded-xl border-l-4 border-blue-500 text-[11px] leading-relaxed text-blue-700 font-medium">🚌 {itinerary[activeDay].infoBox}</div>}
                                    {itinerary[activeDay].warnBox && <div className="bg-amber-50 p-3 rounded-xl border-l-4 border-amber-500 text-[11px] leading-relaxed text-amber-800 font-medium mt-2">👨‍🏫 {itinerary[activeDay].warnBox}</div>}
                                </div>

                                {/* Event Cards */}
                                {itinerary[activeDay].events.map((e, idx) => {
                                    const isExpanded = expandedEvent === e.id;
                                    return (
                                        <div key={e.id}>
                                            <div onClick={() => toggleEvent(e.id)} className={`diary-card p-5 relative ${isExpanded ? 'diary-card-active' : ''}`}>
                                                <div className="flex justify-between items-start">
                                                    <div className="flex gap-3">
                                                        <span className={`text-[10px] font-black px-2 py-1 rounded h-fit ${isExpanded ? 'bg-orange-400 text-white' : 'bg-slate-100 text-slate-500'}`}>{e.time}</span>
                                                        <div>
                                                            <h4 className="font-bold text-md diamond-bullet">{e.title}</h4>
                                                            {!isExpanded && <div className="mt-2"><div className="detail-btn">詳細資訊 <SafeIcon name="ChevronDown" size={12} /></div></div>}
                                                        </div>
                                                    </div>
                                                </div>
                                                {isExpanded && (
                                                    <div className="mt-4 pt-4 border-t-2 border-dashed border-slate-100 space-y-3 animate-pop">
                                                        <p className="text-xs font-bold text-slate-600 leading-relaxed bg-white p-3 rounded-xl border-2 border-slate-100">{e.desc}</p>
                                                        {e.tip && <p className="text-[10px] font-bold text-pink-500 italic px-1">💡 {e.tip}</p>}
                                                        <a href={`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(e.map)}`} target="_blank" className="flex items-center justify-center gap-2 w-full py-3 bg-[var(--diary-navy)] text-white rounded-xl text-xs font-black shadow-[3px_3px_0px_var(--diary-orange)] active:translate-y-0.5" onClick={e=>e.stopPropagation()}>
                                                            <SafeIcon name="MapPin" size={14} /> 開始導航
                                                        </a>
                                                    </div>
                                                )}
                                            </div>
                                            {idx < itinerary[activeDay].events.length - 1 && <div className="time-line-connector"></div>}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'teacher' && (
                            <div className="animate-pop space-y-6">
                                <div className="diary-card p-5 bg-[#FFFDF0]">
                                    <h2 className="text-xl font-black text-[#E07A5F] flex items-center gap-2 mb-2"><SafeIcon name="Briefcase" /> 老師懶人包</h2>
                                    <p className="text-xs font-bold text-slate-500">📌 每天早餐一定同行，其他時段依各天情況不同。</p>
                                </div>
                                {teacherGuide.map((day, idx) => (
                                    <div key={idx} className="diary-card overflow-hidden">
                                        <div className="bg-slate-800 p-4 text-white">
                                            <p className="text-[10px] font-bold text-yellow-300 tracking-widest">{day.day}</p>
                                            <h3 className="font-black text-lg">{day.title}</h3>
                                        </div>
                                        <div className="p-4 space-y-3">
                                            {day.items.map((item, iIdx) => (
                                                <div key={iIdx} className="flex items-center justify-between pb-2 border-b border-slate-50 last:border-0">
                                                    <div className="flex gap-4">
                                                        <span className="text-[11px] font-bold text-slate-400 font-mono w-10">{item.time}</span>
                                                        <span className="text-xs font-bold text-slate-700">{item.label}</span>
                                                    </div>
                                                    {item.must && <span className="teacher-must-tag">必</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'tools' && (
                            <div className="animate-pop space-y-6">
                                <div className="diary-card p-6 bg-yellow-50">
                                    <h3 className="font-black text-lg mb-4 flex items-center gap-2"><SafeIcon name="RefreshCw" /> 算帳小幫手 (1:4.15)</h3>
                                    <div className="space-y-4">
                                        <input type="number" value={hkd} onChange={(e)=>{setHkd(e.target.value); setTwd(e.target.value? (e.target.value*4.15).toFixed(0) : '')}} placeholder="輸入港幣 HKD" className="w-full p-4 rounded-2xl border-2 border-[var(--diary-navy)] font-bold outline-none" />
                                        <div className="p-4 bg-white rounded-2xl border-2 border-[var(--diary-navy)] text-center shadow-inner">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">約等於台幣</p>
                                            <p className="text-4xl font-black text-orange-500 font-mono">NT$ {twd || 0}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Bottom Nav */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50 px-4 pb-6">
                        <div className="bg-white border-[3px] border-[var(--diary-navy)] p-2 flex justify-between items-center rounded-[3rem] shadow-[0_10px_25px_rgba(0,0,0,0.1)]">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'itinerary' ? 'bg-rose-100 scale-105' : ''}`}>
                                <SafeIcon name="Home" className={activeTab === 'itinerary' ? 'text-rose-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black">行程</span>
                            </button>
                            <button onClick={() => setActiveTab('tools')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'tools' ? 'bg-yellow-100 scale-105' : ''}`}>
                                <SafeIcon name="RefreshCw" className={activeTab === 'tools' ? 'text-amber-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black">工具</span>
                            </button>
                            <button onClick={() => setActiveTab('teacher')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'teacher' ? 'bg-indigo-100 scale-105' : ''}`}>
                                <SafeIcon name="Briefcase" className={activeTab === 'teacher' ? 'text-indigo-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black">老師</span>
                            </button>
                            <button onClick={() => setActiveTab('ai')} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-full transition-all ${activeTab === 'ai' ? 'bg-pink-100 scale-105' : ''}`}>
                                <SafeIcon name="Sparkles" className={activeTab === 'ai' ? 'text-pink-500' : 'text-slate-300'} />
                                <span className="text-[9px] font-black">助手</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
